# Codex CLI managed config — registers the container-only identity context
# hook (ADR 0011 Layer 3) and the Memory baseline/warning/OOM detection hook
# (ADR 0020). SessionStart injects identity context and snapshots the OOM
# baseline; PostToolUse polls the Container's cgroup after every tool call
# (verified supported by codex-cli 0.144.5). Both scripts guard on the
# identity file, keeping this managed config a no-op on host.
[hooks]
SessionStart = [
    { hooks = [
        { type = "command", command = "bash /usr/local/bin/boxa-identity-context.sh" },
        { type = "command", command = "sh /usr/local/bin/boxa-memory-context.sh session-start" },
    ] }
]
PostToolUse = [
    { hooks = [{ type = "command", command = "sh /usr/local/bin/boxa-memory-context.sh" }] }
]
